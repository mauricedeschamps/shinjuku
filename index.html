    <meta name="theme-color" content="#d42e2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #d42e2e;
            --primary-dark: #a00f0f;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --dark-text: #ffffff;
            --light-bg: #f8f9fa;
            --light-card: #ffffff;
            --light-text: #212529;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 60px;
        }

        body.light-mode {
            background-color: var(--light-bg);
            color: var(--light-text);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--shadow);
        }

        body.light-mode header {
            background-color: rgba(255, 255, 255, 0.95);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.5rem;
            transform: rotate(5deg);
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .lang-selector {
            display: flex;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 30px;
        }

        body.light-mode .lang-selector {
            background: rgba(0, 0, 0, 0.05);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            background-color: #2c2c2c;
            color: #ddd;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-size: 0.9rem;
        }

        body.light-mode .btn {
            background-color: #e9ecef;
            color: #495057;
        }

        .btn:hover {
            background-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .btn.active {
            background-color: var(--primary);
            color: white;
        }

        .lang-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            min-width: 50px;
        }

        .mode-icon {
            font-size: 1.2rem;
            margin-right: 4px;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin: 20px 0 40px;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .spot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .spot-card {
            background-color: var(--dark-card);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        body.light-mode .spot-card {
            background-color: var(--light-card);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .spot-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .spot-image-container {
            height: 200px;
            overflow: hidden;
            background-color: #2a2a2a;
        }

        .spot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .spot-card:hover .spot-image {
            transform: scale(1.05);
        }

        .spot-info {
            padding: 20px;
        }

        .spot-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .spot-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 12px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }

        body.light-mode .spot-location {
            color: #6c757d;
        }

        .spot-description {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Detail Page */
        .detail-page {
            display: none;
            animation: fadeIn 0.3s;
        }

        .detail-header {
            position: relative;
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-hover);
        }

        .detail-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background-color: #2a2a2a;
        }

        .detail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 30px;
        }

        .detail-title {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid var(--primary);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
        }

        .detail-section {
            background-color: var(--dark-card);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        body.light-mode .detail-section {
            background-color: var(--light-card);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        .official-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .official-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 46, 46, 0.3);
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            z-index: 1000;
        }

        body.light-mode footer {
            background-color: rgba(255, 255, 255, 0.95);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .contact-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            header {
                height: auto;
                padding: 10px;
                flex-direction: column;
                gap: 10px;
            }
            
            body {
                padding-top: 120px;
            }
            
            .controls {
                width: 100%;
                justify-content: center;
            }
            
            .detail-image {
                height: 250px;
            }
            
            .detail-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

                location: { en: "Kabukicho", ja: "新宿区歌舞伎町", zh: "新宿区歌舞伎町" },
                access: {

                    ja: "西武新宿駅から徒歩3分",

                },
                nearby: { 
                    en: "Former Koma Theater",
                    ja: "新宿コマ劇場跡",
                    zh: "新宿Koma剧场旧址"
                },
                official: "https://www.city.shinjuku.lg.jp/",
                image: "https://thumb.photo-ac.com/a0/a0655aabb3703e86f3ec3e1758ccb976_w.jpeg"
            },
            {
                id: 10,
                name: { en: "Shinjuku Gyoen", ja: "新宿御苑", zh: "新宿御苑" },
                description: {

                    ja: "都会の喧騒を忘れさせる広大な緑。フランス式・イギリス式・日本庭園が融合した美しい公園。四季折々の花々が楽しめます。",

                },
                location: { en: "Naito-machi", ja: "新宿区内藤町", zh: "新宿区内藤町" },
                access: {

            {

                name: { en: "Southern Terrace & Bridge", ja: "サザンテラス＆歩道橋", zh: "南方露台＆步道桥" },
                description: {

                    ja: "新宿駅南口直結の開放的な遊歩道。おしゃれなカフェが並び、冬は美しいイルミネーション。歩道橋は高層ビル群のフォトスポット。",
                    zh: "与新宿站南口直连的开放步道。时尚咖啡馆林立，冬季有美丽的灯饰。步道桥是拍摄高层建筑群的打卡点。"
                },
                location: { en: "Yoyogi, Shibuya", ja: "渋谷区代々木", zh: "涩谷区代代木" },
                access: { 
                    en: "Direct from JR Shinjuku South Exit",
                    ja: "JR新宿駅南口直結",
                    zh: "JR新宿站南口直达"
                },
                nearby: { 
                    en: "Takashimaya Times Square",
                    ja: "タカシマヤタイムズスクエア",
                    zh: "高岛屋时代广场"
                },
                official: "https://www.shinjuku-southernt terrace.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 12,
                name: { en: "Central Park & Niagara Falls", ja: "中央公園＆ナイアガラ瀑布", zh: "中央公园＆尼亚加拉瀑布" },
                description: { 
                    en: "An oasis among skyscrapers. The 'Niagara Falls' in the park stands out. Jogging courses available.",
                    ja: "高層ビル群のオアシス。園内の「ナイアガラの滝」は都会でひときわ存在感を放ちます。ランニングコースも整備。",
                    zh: "高层建筑群的绿洲。园内的「尼亚加拉瀑布」在都市中格外引人注目。设有跑步路线。"
                },
                location: { en: "2-chome Nishi-Shinjuku", ja: "新宿区西新宿2丁目", zh: "新宿区西新宿2丁目" },
                access: { 
                    en: "3 min walk from Tochomae Station",
                    ja: "都庁前駅から徒歩3分",
                    zh: "从都厅前站步行3分钟"
                },
                nearby: { 
                    en: "Tokyo Metro Gov't",
                    ja: "東京都庁",
                    zh: "东京都厅"
                },
                official: "https://www.city.shinjuku.lg.jp/kanko/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            }
        ];

        // State
        let currentLang = 'en';
        let darkMode = true;
        let currentSpotId = null;

        // DOM Elements
        const mainPage = document.getElementById('mainPage');
        const detailPage = document.getElementById('detailPage');
        const spotGrid = document.getElementById('spotGrid');
        const appName = document.getElementById('appName');
        const mainTitle = document.getElementById('mainTitle');
        const modeToggle = document.getElementById('modeToggle');
        const modeIcon = document.querySelector('.mode-icon');
        const modeText = document.getElementById('modeText');
        const contactText = document.getElementById('contactText');
        const langBtns = document.querySelectorAll('.lang-btn');

        // Load saved preferences
        function loadSettings() {
            const savedLang = localStorage.getItem('language');
            if (savedLang && ['en', 'ja', 'zh'].includes(savedLang)) {
                currentLang = savedLang;
            } else {
                // Detect browser language
                const browserLang = navigator.language.split('-')[0];
                if (browserLang === 'ja') currentLang = 'ja';
                else if (browserLang === 'zh') currentLang = 'zh';
                else currentLang = 'en';
            }

            const savedMode = localStorage.getItem('darkMode');
            if (savedMode !== null) {
                darkMode = savedMode === 'true';
            } else {
                darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }

            updateLanguageButtons();
            updateMode();
            updateUITexts();
        }

        function updateLanguageButtons() {
            langBtns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === currentLang) {
                    btn.classList.add('active');
                }
            });
        }

        function updateUITexts() {
            const t = translations[currentLang];
            appName.textContent = t.appName;
            mainTitle.textContent = t.mainTitle;
            modeText.textContent = darkMode ? t.modeDark : t.modeLight;
            contactText.textContent = t.contact;
            
            renderSpots();
            if (currentSpotId !== null) {
                renderSpotDetail(currentSpotId);
            }
        }

        function updateMode() {
            if (darkMode) {
                document.body.classList.remove('light-mode');
                modeIcon.textContent = '🌙';
            } else {
                document.body.classList.add('light-mode');
                modeIcon.textContent = '☀️';
            }
            const t = translations[currentLang];
            modeText.textContent = darkMode ? t.modeDark : t.modeLight;
            localStorage.setItem('darkMode', darkMode);
        }

        // Render spots grid
        function renderSpots() {
            spotGrid.innerHTML = '';
            spots.forEach(spot => {
                const card = document.createElement('div');
                card.className = 'spot-card';
                card.dataset.id = spot.id;
                card.innerHTML = `
                    <div class="spot-image-container">
                        <img src="${spot.image}" alt="${spot.name[currentLang]}" class="spot-image" loading="lazy">
                    </div>
                    <div class="spot-info">
                        <h2 class="spot-name">${spot.name[currentLang]}</h2>
                        <div class="spot-location">📍 ${spot.location[currentLang]}</div>
                        <p class="spot-description">${spot.description[currentLang]}</p>
                    </div>
                `;
                card.addEventListener('click', () => showSpotDetail(spot.id));
                spotGrid.appendChild(card);
            });
        }

        // Show detail page
        function showSpotDetail(id) {
            currentSpotId = id;
            mainPage.style.display = 'none';
            detailPage.style.display = 'block';
            renderSpotDetail(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Render spot detail
        function renderSpotDetail(id) {
            const spot = spots.find(s => s.id === id);
            if (!spot) return;

            const t = translations[currentLang];

            detailPage.innerHTML = `
                <div class="detail-header">
                    <img src="${spot.image}" alt="${spot.name[currentLang]}" class="detail-image">
                    <div class="detail-overlay">
                        <h2 class="detail-title">${spot.name[currentLang]}</h2>
                        <div class="spot-location" style="color: #ccc;">📍 ${spot.location[currentLang]}</div>
                    </div>
                    <button class="back-btn" id="backBtn">${t.backButton}</button>
                </div>
                <div class="detail-content">
                    <div class="detail-section">
                        <h3 class="section-title">${t.description}</h3>
                        <p>${spot.description[currentLang]}</p>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title">${t.access}</h3>
                        <p>${spot.access[currentLang]}</p>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title">${t.nearby}</h3>
                        <p>${spot.nearby[currentLang]}</p>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title">${t.official}</h3>
                        <a href="${spot.official}" target="_blank" class="official-link">${t.visitButton}</a>
                    </div>
                </div>
            `;

            document.getElementById('backBtn').addEventListener('click', () => {
                detailPage.style.display = 'none';
                mainPage.style.display = 'block';
                currentSpotId = null;
            });
        }

        // Event listeners
        langBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentLang = e.target.dataset.lang;
                localStorage.setItem('language', currentLang);
                updateLanguageButtons();
                updateUITexts();
            });
        });

        modeToggle.addEventListener('click', () => {
            darkMode = !darkMode;
            updateMode();
            updateUITexts();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();

            // Register Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            }
        });
    </script>
