<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#d42e2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shinjuku 12">
    <title>Shinjuku 12 Spots - Ultimate Travel Guide</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary: #d42e2e;
            --primary-dark: #a00f0f;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --dark-text: #ffffff;
            --light-bg: #f8f9fa;
            --light-card: #ffffff;
            --light-text: #212529;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 60px;
        }

        body.light-mode {
            background-color: var(--light-bg);
            color: var(--light-text);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--shadow);
        }

        body.light-mode header {
            background-color: rgba(255, 255, 255, 0.95);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.5rem;
            transform: rotate(5deg);
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 30px;
            background-color: #2c2c2c;
            color: #ddd;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        body.light-mode .btn {
            background-color: #e9ecef;
            color: #495057;
        }

        .btn:hover {
            background-color: #3a3a3a;
            transform: translateY(-2px);
        }

        .btn.active {
            background-color: var(--primary);
            color: white;
        }

        .mode-icon {
            font-size: 1.2rem;
            margin-right: 4px;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin: 20px 0 40px;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .spot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .spot-card {
            background-color: var(--dark-card);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        body.light-mode .spot-card {
            background-color: var(--light-card);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .spot-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .spot-image-container {
            height: 200px;
            overflow: hidden;
            background-color: #2a2a2a;
        }

        .spot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .spot-card:hover .spot-image {
            transform: scale(1.05);
        }

        .spot-info {
            padding: 20px;
        }

        .spot-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .spot-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 12px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
        }

        body.light-mode .spot-location {
            color: #6c757d;
        }

        .spot-description {
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Detail Page */
        .detail-page {
            display: none;
            animation: fadeIn 0.3s;
        }

        .detail-header {
            position: relative;
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-hover);
        }

        .detail-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background-color: #2a2a2a;
        }

        .detail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 30px;
        }

        .detail-title {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid var(--primary);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
        }

        .detail-section {
            background-color: var(--dark-card);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        body.light-mode .detail-section {
            background-color: var(--light-card);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
        }

        .official-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .official-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 46, 46, 0.3);
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            z-index: 1000;
        }

        body.light-mode footer {
            background-color: rgba(255, 255, 255, 0.95);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .contact-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        /* Loader */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(212, 46, 46, 0.2);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .logo span { font-size: 1rem; }
            .btn { padding: 6px 12px; font-size: 0.9rem; }
            .detail-image { height: 250px; }
            .detail-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">S</div>
            <span>Shinjuku 12 Spots</span>
        </div>
        <div class="controls">
            <button class="btn mode-toggle" id="modeToggle">
                <span class="mode-icon">🌙</span>
                <span>Dark</span>
            </button>
        </div>
    </header>

    <div class="container">
        <h1>Discover 12 Hidden Gems in Shinjuku</h1>
        
        <div id="mainPage">
            <div class="spot-grid" id="spotGrid"></div>
        </div>
        
        <div id="detailPage" class="detail-page"></div>
    </div>

    <footer>
        <span>© 2025 Shinjuku Guide</span>
        <span>•</span>
        <a href="mailto:mementomorikatsu@gmail.com" class="contact-link">Contact</a>
    </footer>

    <script>
        // Spot Data - 12 Shinjuku Locations
        const spots = [
            {
                id: 1,
                name: "Kabukicho Ichibangai",
                description: "Japan's most famous entertainment district. The entrance lined with giant neon signs is an iconic spot that everyone wants to photograph. The nightscape shows a completely different face from daytime, filled with unique energy.",
                location: "Kabukicho, Shinjuku",
                access: "7 min walk from JR Shinjuku Station East Exit",
                nearby: "Shinjuku Toho Building, Godzilla Head",
                official: "https://www.kabukicho.or.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 2,
                name: "Omoide Yokocho",
                description: "A retro alley under the JR tracks at West Exit. Fragrant smoke from yakitori and grilled offal fills the air, with lively taverns lining the narrow lanes.",
                location: "1-chome Nishi-Shinjuku",
                access: "3 min walk from JR Shinjuku West Exit",
                nearby: "Shinjuku Nomura Building",
                official: "https://shinjuku-omoide.com/",
                image: "https://images.unsplash.com/photo-1503891450247-ee5f8ec46dc3?w=600"
            },
            {
                id: 3,
                name: "Shinjuku Golden Gai",
                description: "A unique area with around 300 tiny bars clustered like a maze. Dim neon lights and Showa-era buildings make you feel like you've traveled back in time.",
                location: "1-chome Kabukicho",
                access: "5 min walk from Higashi-Shinjuku Station",
                nearby: "Hanazono Shrine",
                official: "http://goldengai.jp/",
                image: "https://images.unsplash.com/photo-1536099659527-9768a30ecf32?w=600"
            },
            {
                id: 4,
                name: "Tokyu Kabukicho Tower",
                description: "A new entertainment landmark opened in 2023. High-rise complex with theaters, live halls, hotels, and restaurants. Bustling day and night.",
                location: "1-chome Kabukicho",
                access: "8 min walk from JR Shinjuku East",
                nearby: "Shinjuku TOKYU MILANO",
                official: "https://www.tokyu-kabukicho-tower.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 5,
                name: "3D Calico Cat",
                description: "A gigantic 3D calico cat appears on the Cross Shinjuku Vision at East Exit. Realistic movements as if peeking out from the building delight passersby.",
                location: "3-chome Shinjuku",
                access: "Directly at JR Shinjuku East Exit",
                nearby: "Shinjuku Alta",
                official: "https://www.cross-s.shinjuku/",
                image: "https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=600"
            },
            {
                id: 6,
                name: "Shinjuku Nichome",
                description: "One of Japan's largest LGBTQ+ districts. Diverse bars and clubs; recently more tourists visit as an inclusive town.",
                location: "2-chome Shinjuku",
                access: "4 min walk from Shinjuku-sanchome Station",
                nearby: "Isetan Shinjuku",
                official: "https://www.ni-chome.or.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 7,
                name: "Tokyo Metro Gov't Observatory",
                description: "Free observatory at 202m above ground. 360-degree panorama with Mt. Fuji on clear days. Romantic night view.",
                location: "2-chome Nishi-Shinjuku",
                access: "Directly at Tochomae Station",
                nearby: "Shinjuku Central Park",
                official: "https://www.yokoso.metro.tokyo.lg.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 8,
                name: "Shin-Okubo Koreatown",
                description: "One of Japan's largest Korean towns. Lined with Korean restaurants, cosmetics shops, and K-POP goods stores.",
                location: "Okubo, Shinjuku",
                access: "1 min walk from JR Shin-Okubo Station",
                nearby: "Okubo-dori",
                official: "https://shin-okubo.org/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 9,
                name: "Okubo Park",
                description: "A park in Kabukicho. A relaxing spot by day and a social hub for young people by night, gaining attention via social media.",
                location: "Kabukicho",
                access: "3 min walk from Seibu-Shinjuku Station",
                nearby: "Former Koma Theater",
                official: "https://www.city.shinjuku.lg.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 10,
                name: "Shinjuku Gyoen",
                description: "Vast greenery that makes you forget city bustle. A beautiful park blending French, English, and Japanese gardens. Seasonal flowers.",
                location: "Naito-machi",
                access: "5 min walk from Shinjuku Gate",
                nearby: "National Stadium",
                official: "https://fng.or.jp/shinjuku/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 11,
                name: "Southern Terrace & Bridge",
                description: "Open promenade directly connected to the south exit. Stylish cafes, beautiful winter illuminations. The pedestrian bridge is a photospot for skyscrapers.",
                location: "Yoyogi, Shibuya",
                access: "Direct from JR Shinjuku South Exit",
                nearby: "Takashimaya Times Square",
                official: "https://www.shinjuku-southernt terrace.jp/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            },
            {
                id: 12,
                name: "Central Park & Niagara Falls",
                description: "An oasis among skyscrapers. The 'Niagara Falls' in the park stands out. Jogging courses available.",
                location: "2-chome Nishi-Shinjuku",
                access: "3 min walk from Tochomae Station",
                nearby: "Tokyo Metro Gov't",
                official: "https://www.city.shinjuku.lg.jp/kanko/",
                image: "https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=600"
            }
        ];

        let darkMode = true;
        let currentSpotId = null;

        const mainPage = document.getElementById('mainPage');
        const detailPage = document.getElementById('detailPage');
        const spotGrid = document.getElementById('spotGrid');
        const modeToggle = document.getElementById('modeToggle');
        const modeIcon = document.querySelector('.mode-icon');

        // Load saved preferences
        function loadSettings() {
            const savedMode = localStorage.getItem('darkMode');
            if (savedMode !== null) {
                darkMode = savedMode === 'true';
            } else {
                darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            updateMode();
        }

        function updateMode() {
            if (darkMode) {
                document.body.classList.remove('light-mode');
                modeIcon.textContent = '🌙';
                modeToggle.innerHTML = '<span class="mode-icon">🌙</span><span>Dark</span>';
            } else {
                document.body.classList.add('light-mode');
                modeIcon.textContent = '☀️';
                modeToggle.innerHTML = '<span class="mode-icon">☀️</span><span>Light</span>';
            }
            localStorage.setItem('darkMode', darkMode);
        }

        // Render spots grid
        function renderSpots() {
            spotGrid.innerHTML = '';
            spots.forEach(spot => {
                const card = document.createElement('div');
                card.className = 'spot-card';
                card.dataset.id = spot.id;
                card.innerHTML = `
                    <div class="spot-image-container">
                        <img src="${spot.image}" alt="${spot.name}" class="spot-image" loading="lazy">
                    </div>
                    <div class="spot-info">
                        <h2 class="spot-name">${spot.name}</h2>
                        <div class="spot-location">📍 ${spot.location}</div>
                        <p class="spot-description">${spot.description}</p>
                    </div>
                `;
                card.addEventListener('click', () => showSpotDetail(spot.id));
                spotGrid.appendChild(card);
            });
        }

        // Show detail page
        function showSpotDetail(id) {
            currentSpotId = id;
            mainPage.style.display = 'none';
            detailPage.style.display = 'block';
            renderSpotDetail(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Render spot detail
        function renderSpotDetail(id) {
            const spot = spots.find(s => s.id === id);
            if (!spot) return;

            detailPage.innerHTML = `
                <div class="detail-header">
                    <img src="${spot.image}" alt="${spot.name}" class="detail-image">
                    <div class="detail-overlay">
                        <h2 class="detail-title">${spot.name}</h2>
                        <div class="spot-location" style="color: #ccc;">📍 ${spot.location}</div>
                    </div>
                    <button class="back-btn" id="backBtn">← Back to List</button>
                </div>
                <div class="detail-content">
                    <div class="detail-section">
                        <h3 class="section-title">Description</h3>
                        <p>${spot.description}</p>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title">Access</h3>
                        <p>${spot.access}</p>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title">Nearby Spots</h3>
                        <p>${spot.nearby}</p>
                    </div>
                    <div class="detail-section">
                        <h3 class="section-title">Official Website</h3>
                        <a href="${spot.official}" target="_blank" class="official-link">Visit Website →</a>
                    </div>
                </div>
            `;

            document.getElementById('backBtn').addEventListener('click', () => {
                detailPage.style.display = 'none';
                mainPage.style.display = 'block';
                currentSpotId = null;
            });
        }

        // Event listeners
        modeToggle.addEventListener('click', () => {
            darkMode = !darkMode;
            updateMode();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            renderSpots();

            // Register Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            }
        });
    </script>
</body>
</html>
