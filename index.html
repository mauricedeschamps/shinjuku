    <style>
        /* === リセット＆変数 === */
        :root {
            --primary: #d42e2e;
            --primary-dark: #a00f0f;
            --accent: #ffb347;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --dark-text: #f0f0f0;
            --light-bg: #faf6f0;
            --light-card: #ffffff;
            --light-text: #1a1a1a;
            --shadow: 0 8px 24px rgba(0,0,0,0.2);
            --transition: all 0.2s ease-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', 'Segoe UI', 'Hiragino Sans', '游ゴシック', sans-serif;
            background-color: var(--dark-bg);
            color: var(--dark-text);
            line-height: 1.6;
            padding-top: 80px;
            padding-bottom: 70px;
            min-height: 100vh;
            background-image: radial-gradient(circle at 30% 10%, #2a2a2a 0%, #0f0f0f 100%);
            transition: background-color 0.3s, color 0.2s;
        }

        body.light-mode {
            background-color: var(--light-bg);
            color: var(--light-text);
            background-image: radial-gradient(circle at 30% 10%, #fff3e0 0%, #f0e4d0 100%);
        }

        /* === ヘッダー === */
        header {
            background-color: rgba(18, 18, 18, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            padding: 12px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            border-bottom: 2px solid var(--primary);
        }

        body.light-mode header {
            background-color: rgba(255, 250, 240, 0.96);
            border-bottom: 2px solid var(--primary);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: var(--primary);
            text-shadow: 0 2px 2px rgba(0,0,0,0.3);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, var(--primary), #b71c1c);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            font-weight: 800;
            box-shadow: 0 4px 6px rgba(190, 30, 30, 0.4);
            transform: rotate(5deg);
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 36px;
            background-color: #2c2c2c;
            color: #ddd;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transition: var(--transition);
        }

        body.light-mode .btn {
            background-color: #e4d9cd;
            color: #2a1f1a;
        }

        .btn:hover {
            transform: scale(1.04);
            background-color: #3a3a3a;
        }

        .btn.active {
            background: var(--primary);
            color: white;
            font-weight: 700;
        }

        .mode-icon {
            font-size: 1.3rem;
        }

        /* === メインエリア === */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 16px 30px;
        }

        .main-title {
            text-align: center;
            margin: 5px 0 35px;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .main-title::after {
            content: '⚡';
            font-size: 2rem;
            margin-left: 12px;
            background: none;
            -webkit-text-fill-color: var(--primary);
        }

        .spot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .spot-card {
            background-color: var(--dark-card);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.5);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 85, 85, 0.2);
            transition: transform 0.25s ease, box-shadow 0.3s;
        }

        body.light-mode .spot-card {
            background-color: var(--light-card);
            border: 1px solid #e0c8b0;
        }

        .spot-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 22px 30px -6px #a03f3f80;
        }

        .spot-image-container {
            position: relative;
            height: 190px;
            overflow: hidden;
        }

        .spot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .spot-card:hover .spot-image {
            transform: scale(1.08);
        }

        .spot-info {
            padding: 20px 18px 22px;
            flex: 1;
        }

        .spot-name {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--primary);
            line-height: 1.3;
        }

        .spot-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #b0b0b0;
            font-size: 0.95rem;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            padding-left: 8px;
        }

        body.light-mode .spot-location {
            color: #5f4e44;
        }

        .spot-description {
            font-size: 0.95rem;
            opacity: 0.9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 詳細ページ */
        .detail-page {
            display: none;
            animation: fadeIn 0.4s;
        }

        .detail-header {
            position: relative;
            margin-bottom: 30px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 30px -5px #200000;
        }

        .detail-image {
            width: 100%;
            height: 380px;
            object-fit: cover;
            display: block;
        }

        .detail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #000000e0, transparent);
            padding: 30px 25px 20px;
        }

        .detail-title {
            color: white;
            font-size: 2.3rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 0 4px 8px black;
        }

        .back-btn {
            position: absolute;
            top: 18px;
            left: 18px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(6px);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid var(--primary);
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        .detail-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
        }

        @media (max-width: 700px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
        }

        .detail-section {
            background-color: var(--dark-card);
            border-radius: 24px;
            padding: 26px;
            box-shadow: var(--shadow);
            border: 1px solid #332211;
        }

        body.light-mode .detail-section {
            background-color: #fef9f2;
            border: 1px solid #dbb894;
        }

        .section-title {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--primary);
            border-left: 8px solid var(--primary);
            padding-left: 16px;
        }

        .official-link {
            display: inline-block;
            background: linear-gradient(130deg, var(--primary), #b72a2a);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 16px;
            box-shadow: 0 10px 12px -5px #7f2020;
            transition: 0.15s;
        }

        .official-link:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        footer {
            background-color: #0d0d0d;
            padding: 26px 20px;
            text-align: center;
            color: #aaa;
            border-top: 2px solid var(--primary);
        }

        body.light-mode footer {
            background-color: #e4d5c4;
            color: #3b2e26;
        }

        .contact-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            font-size: 1.15rem;
        }

        .lang-selector {
            display: flex;
            gap: 6px;
            background: #2a2a2a;
            padding: 5px;
            border-radius: 40px;
        }

        body.light-mode .lang-selector {
            background: #dacbbd;
        }

        .lang-btn {
            padding: 6px 12px;
            min-width: 52px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        /* アニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ローダー */
        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 5px solid rgba(212, 46, 46, 0.2);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite;
        }

        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

        /* モバイル最適化 */
        @media (max-width: 480px) {
            .logo span { font-size: 1.1rem; }
            .controls { gap: 5px; }
            .btn { padding: 6px 12px; }
            .detail-image { height: 260px; }
            .detail-title { font-size: 1.9rem; }
        }
    </style>
</head>

                    description: { ja: "高層ビル群のオアシス。園内の「ナイアガラの滝」は都会でひときわ存在感を放ちます。ランニングコースも整備。", en: "An oasis among skyscrapers. The 'Niagara Falls' in the park stands out. Jogging courses available.", zh: "高层建筑群的绿洲。园内的"尼亚加拉瀑布"在都市中格外引人注目。设有跑步路线。" },
                    location: { ja: "新宿区西新宿2丁目", en: "2-chome Nishi-Shinjuku", zh: "新宿区西新宿2丁目" },
                    access: { ja: "都庁前駅から徒歩3分", en: "3 min walk from Tochomae Station", zh: "从都厅前站步行3分钟" },
                    nearby: { ja: "東京都庁", en: "Tokyo Metro Gov't", zh: "东京都厅" },
                    official: "https://www.city.shinjuku.lg.jp/kanko/",
                    image: "https://www.gotokyo.org/jp/spot/28/img/28_0010_0009_500x334.jpg"
                }
            ];

            // 画像が万一404にならないよう、デフォルト画像を紛れ込ませる処理はここでは省く(実在想定)

            let currentLang = 'ja';
            let darkMode = true;
            let currentSpotId = null;

            const mainPage = document.getElementById('mainPage');
            const detailPage = document.getElementById('detailPage');
            const spotGrid = document.getElementById('spotGrid');
            const appName = document.querySelector('.app-name');
            const mainTitle = document.querySelector('.main-title');
            const modeToggle = document.getElementById('modeToggle');
            const modeIcon = document.querySelector('.mode-icon');

            // ストレージ読込
            function loadSettings() {
                const savedLang = localStorage.getItem('lang');
                if (savedLang && ['ja','en','zh'].includes(savedLang)) currentLang = savedLang;
                else currentLang = 'ja'; // デフォルト日本語

                const savedMode = localStorage.getItem('darkMode');
                if (savedMode !== null) darkMode = (savedMode === 'true');
                else darkMode = true;

                updateLangButtons();
                updateMode();
            }

            function updateLangButtons() {
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.lang === currentLang) btn.classList.add('active');
                });
                updateTexts();
            }

            function updateTexts() {
                appName.textContent = currentLang === 'ja' ? '新宿12景' : currentLang === 'en' ? 'Shinjuku 12 Scenes' : '新宿12景';
                mainTitle.textContent = currentLang === 'ja' ? '新宿 奥深き12景' : currentLang === 'en' ? 'Shinjuku: 12 Hidden Gems' : '新宿 深度12景';
                renderSpots();
                if (currentSpotId) renderSpotDetail(currentSpotId);
            }

            function updateMode() {
                if (darkMode) {
                    document.body.classList.remove('light-mode');
                    modeIcon.textContent = '🌙';
                } else {
                    document.body.classList.add('light-mode');
                    modeIcon.textContent = '☀️';
                }
                localStorage.setItem('darkMode', darkMode);
            }

            // カード一覧描画
            function renderSpots() {
                spotGrid.innerHTML = '';
                spots.forEach(spot => {
                    const card = document.createElement('div');
                    card.className = 'spot-card';
                    card.dataset.id = spot.id;
                    // 画像読み込み失敗対策にonerror設定
                    card.innerHTML = `
                        <div class="spot-image-container">
                            <img src="${spot.image}" alt="${spot.name.ja}" class="spot-image" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%22200%22%20viewBox%3D%220%200%20300%20200%22%3E%3Crect%20width%3D%22300%22%20height%3D%22200%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2220%22%20y%3D%22120%22%20fill%3D%22%23d42e2e%22%20font-size%3D%2224%22%3E新宿%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        </div>
                        <div class="spot-info">
                            <h2 class="spot-name">${spot.name[currentLang]}</h2>
                            <div class="spot-location">📍 ${spot.location[currentLang]}</div>
                            <p class="spot-description">${spot.description[currentLang]}</p>
                        </div>
                    `;
                    card.addEventListener('click', () => showSpotDetail(spot.id));
                    spotGrid.appendChild(card);
                });
            }

            function showSpotDetail(id) {
                currentSpotId = id;
                mainPage.style.display = 'none';
                detailPage.style.display = 'block';
                renderSpotDetail(id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function renderSpotDetail(id) {
                const spot = spots.find(s => s.id === id);
                if (!spot) return;
                const backText = currentLang === 'ja' ? '← 一覧に戻る' : currentLang === 'en' ? '← Back' : '← 返回';
                const officialBtnText = currentLang === 'ja' ? '公式サイトへ' : currentLang === 'en' ? 'Official Site' : '官方网站';
                detailPage.innerHTML = `
                    <div class="detail-header">
                        <img src="${spot.image}" alt="${spot.name.ja}" class="detail-image" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22800%22%20height%3D%22400%22%20viewBox%3D%220%200%20800%20400%22%3E%3Crect%20fill%3D%22%23333%22%20width%3D%22800%22%20height%3D%22400%22%2F%3E%3Ctext%20x%3D%22200%22%20y%3D%22200%22%20fill%3D%22%23d42e2e%22%20font-size%3D%2248%22%3E新宿%20%3C%2Ftext%3E%3C%2Fsvg%3E'">
                        <div class="detail-overlay">
                            <h2 class="detail-title">${spot.name[currentLang]}</h2>
                            <div class="spot-location" style="color:#ccc;">📍 ${spot.location[currentLang]}</div>
                        </div>
                        <button class="back-btn" id="backBtn">${backText}</button>
                    </div>
                    <div class="detail-content">
                        <div class="detail-section">
                            <h3 class="section-title">${currentLang==='ja'?'概要':currentLang==='en'?'Description':'简介'}</h3>
                            <p>${spot.description[currentLang]}</p>
                        </div>
                        <div class="detail-section">
                            <h3 class="section-title">${currentLang==='ja'?'アクセス':currentLang==='en'?'Access':'交通'}</h3>
                            <p>${spot.access[currentLang]}</p>
                        </div>
                        <div class="detail-section">
                            <h3 class="section-title">${currentLang==='ja'?'周辺情報':currentLang==='en'?'Nearby':'周边'}</h3>
                            <p>${spot.nearby[currentLang]}</p>
                        </div>
                        <div class="detail-section">
                            <h3 class="section-title">${currentLang==='ja'?'公式情報':currentLang==='en'?'Official':'官网'}</h3>
                            <a href="${spot.official}" target="_blank" class="official-link">${officialBtnText}</a>
                        </div>
                    </div>
                `;
                document.getElementById('backBtn').addEventListener('click', () => {
                    detailPage.style.display = 'none';
                    mainPage.style.display = 'block';
                    currentSpotId = null;
                });
            }

            // イベント
            function setupEvents() {
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        currentLang = e.target.dataset.lang;
                        localStorage.setItem('lang', currentLang);
                        updateLangButtons();
                    });
                });
                modeToggle.addEventListener('click', () => {
                    darkMode = !darkMode;
                    updateMode();
                });
            }

            // 起動
            document.addEventListener('DOMContentLoaded', () => {
                loadSettings();
                renderSpots();
                setupEvents();

                // マニフェストとServiceWorkerを動的にリンク(ファイル生成は同ディレクトリ前提)
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').catch(e => console.log('SW登録失敗', e));
                }
            });
        })();
    </script>
